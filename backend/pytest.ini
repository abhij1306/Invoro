[pytest]
testpaths = tests
addopts = --strict-markers -v -ra --tb=short -m "unit or component"
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = function
filterwarnings =
    # asyncpg/sqlalchemy teardown noise from the current db session fixture; keep narrow until fixture cleanup lands
    ignore:coroutine 'Connection._cancel' was never awaited:RuntimeWarning
markers =
    unit: Pure function tests, no I/O
    component: Single-service tests with mocked deps
    regression: Full artifact or browser runtime tests
    live: Real network calls, never run in CI
    integration: mark test as requiring external services or full DB
    e2e: mark test as an end-to-end test (slow)
