name: Frontend Playwright Smoke

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/frontend-playwright-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crawlerai_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crawlerai_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      JWT_SECRET_KEY: ci-jwt-secret-key-change-me-32-bytes
      ENCRYPTION_KEY: ci-encryption-key-change-me-32b
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/crawlerai_smoke
      REDIS_STATE_ENABLED: false
      CELERY_DISPATCH_ENABLED: false
      BOOTSTRAP_ADMIN_ONCE: false
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev
          python -m pip install --upgrade pip
          pip install -e .

      - name: Apply backend migrations
        working-directory: backend
        run: |
          python -m alembic upgrade head

      - name: Start backend API server
        working-directory: backend
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &

      - name: Wait for backend healthcheck
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:8000/api/health" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          cat /tmp/backend.log || true
          exit 1

      - name: Start frontend dev server
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
        run: |
          nohup npm run dev -- --hostname 127.0.0.1 --port 3000 > /tmp/frontend.log 2>&1 &

      - name: Wait for frontend root URL
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000/" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time"
          cat /tmp/frontend.log || true
          exit 1

      - name: Run Playwright smoke suite
        env:
          CI: true
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
        run: npm run test:e2e -- smoke.spec.ts
