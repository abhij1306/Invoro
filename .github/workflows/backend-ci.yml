name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      JWT_SECRET_KEY: ci-jwt-secret-key-not-default
      ENCRYPTION_KEY: ci-encryption-key-not-default
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/test_db
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/test_db
      REDIS_STATE_ENABLED: false
      CELERY_DISPATCH_ENABLED: false
      BOOTSTRAP_ADMIN_ONCE: false
      PYTHONPATH: .
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Dependency vulnerability scan
        run: pip-audit --vulnerability-service osv

      - name: Ruff
        run: python -m ruff check app tests

      - name: Mypy
        run: python -m mypy app

      - name: Pytest
        run: python -m pytest tests -q
