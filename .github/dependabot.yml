version: 2
updates:
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - security
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    assignees:
      - abhij
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - security
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    assignees:
      - abhij
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - security
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    assignees:
      - abhij
